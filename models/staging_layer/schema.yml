version: 2

models:
  - name: stg_customers
    description: "Jaffle shop customers"
    config:
      materialized: table
    columns:
      - name: customer_id  
        data_tests:
          - unique
          - not_null

  - name: stg_orders
    description: "Jaffle shop orders"
    config:
      materialized: table
    columns:
      - name: order_id     
        data_tests:
          - unique
          - not_null

  - name: stg_payments
    description: "Jaffle payments"
    config:
      materialized: table
    columns:
      - name: payment_id   
        data_tests:
          - unique
          - not_null

      - name: status
        data_tests:
          - accepted_values:
              values: ['success', 'fail']

      - name: amount
        data_tests:
          - not_null